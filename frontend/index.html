<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thinkloop AI - Intelligent Tutoring System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-blue-600">thinkloop AI</h1>
                </div>
                <div id="nav-user" class="hidden flex items-center space-x-4">
                    <span id="username" class="text-gray-700"></span>
                    <button onclick="logout()" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Login Page -->
    <div id="login-page" class="flex items-center justify-center min-h-screen">
        <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md">
            <h2 class="text-3xl font-bold text-gray-900 mb-6">Welcome Back</h2>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input id="login-email" type="email" required 
                        class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                        placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input id="login-password" type="password" required 
                        class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                        placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700">
                    Login
                </button>
            </form>

            <div class="mt-6 border-t pt-6">
                <p class="text-gray-600 text-sm">Don't have an account?</p>
                <button onclick="showRegister()" class="w-full mt-2 px-4 py-2 border border-blue-600 text-blue-600 rounded-lg hover:bg-blue-50">
                    Create Account
                </button>
            </div>

            <div id="login-error" class="mt-4 hidden p-4 bg-red-100 text-red-700 rounded-lg"></div>
        </div>
    </div>

    <!-- Register Page -->
    <div id="register-page" class="hidden flex items-center justify-center min-h-screen">
        <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md">
            <h2 class="text-3xl font-bold text-gray-900 mb-6">Create Account</h2>
            
            <form id="register-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input id="register-email" type="email" required 
                        class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                        placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Username</label>
                    <input id="register-username" type="text" required 
                        class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                        placeholder="your_username">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">First Name</label>
                        <input id="register-first" type="text" required 
                            class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Last Name</label>
                        <input id="register-last" type="text" required 
                            class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input id="register-password" type="password" required 
                        class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                        placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700">
                    Register
                </button>
            </form>

            <button onclick="showLogin()" class="w-full mt-4 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">
                Back to Login
            </button>

            <div id="register-error" class="mt-4 hidden p-4 bg-red-100 text-red-700 rounded-lg"></div>
        </div>
    </div>

    <!-- Tutor Page -->
    <div id="tutor-page" class="hidden">
        <div class="max-w-2xl mx-auto p-6">
            <h2 class="text-3xl font-bold text-gray-900 mb-6">Ask Your Question</h2>
            
            <!-- Chat Area -->
            <div id="chat-area" class="bg-white rounded-lg shadow-lg p-6 mb-6 h-96 overflow-y-auto border border-gray-300">
                <div class="space-y-4">
                    <!-- Messages go here -->
                </div>
            </div>

            <!-- Input Area -->
            <form id="question-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Your Question</label>
                    <textarea id="question-input" required 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                        placeholder="Ask your question about any topic..."
                        rows="4"></textarea>
                </div>
                <div class="flex space-x-4">
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700">
                        Ask
                    </button>
                    <button type="button" id="hint-btn" onclick="requestHint()" 
                        class="px-6 bg-gray-600 text-white py-2 rounded-lg font-medium hover:bg-gray-700">
                        Hint
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
