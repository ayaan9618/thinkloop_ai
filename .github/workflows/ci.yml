# Continuous Integration Pipeline
# Runs on every push and pull request
# Tests, lints, type-checks, and security scans the codebase

name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Job 1: Code Quality Checks
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Format check with Black
        run: |
          black backend/ --check --line-length=100
          echo "✓ Black formatting check passed"

      - name: Lint with Flake8
        run: |
          flake8 backend/ --max-line-length=100 --exclude=__pycache__,migrations
          echo "✓ Flake8 linting passed"

      - name: Type check with MyPy
        run: |
          mypy backend/ --ignore-missing-imports --no-implicit-optional
          echo "✓ MyPy type checking passed"

  # Job 2: Security Checks
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Bandit security scan
        run: |
          bandit -r backend/ -f json -o bandit-report.json || true
          bandit -r backend/ -f txt
          echo "✓ Security scan complete"

      - name: Upload Bandit results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # Job 3: Unit Tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: thinkloop_ai_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -u root -proot; do
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Run pytest with coverage
        env:
          DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/thinkloop_ai_test
          TESTING_MODE: "true"
          DEBUG: "true"
        run: |
          pytest backend/tests/ \
            -v \
            --cov=backend \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --junitxml=junit.xml

      - name: Upload coverage reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-report
          path: htmlcov/

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: junit-report
          path: junit.xml

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60

  # Job 4: Build Check
  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality, security, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install build

      - name: Build package
        run: |
          python -m build
          echo "✓ Package build successful"

      - name: List build artifacts
        run: |
          ls -lah dist/

  # Job 5: Summary
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [quality, security, test, build]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          echo "🔍 CI Pipeline Summary"
          echo "======================="
          echo "Quality:  ${{ needs.quality.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Tests:    ${{ needs.test.result }}"
          echo "Build:    ${{ needs.build.result }}"
          echo ""
          
          if [[ "${{ needs.quality.result }}" == "failure" || \
                "${{ needs.security.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" || \
                "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ CI Pipeline FAILED"
            exit 1
          else
            echo "✅ CI Pipeline PASSED"
            exit 0
          fi
