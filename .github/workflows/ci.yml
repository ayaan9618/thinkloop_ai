name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: thinkloop_ai
          MYSQL_USER: test
          MYSQL_PASSWORD: test123
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Format check (Black)
        run: black backend/ --check --line-length=100
      
      - name: Lint (Flake8)
        run: flake8 backend/ --max-line-length=100 --exclude=__pycache__
      
      - name: Type check (MyPy)
        run: mypy backend/ --ignore-missing-imports --no-implicit-optional
      
      - name: Security scan (Bandit)
        run: bandit -r backend/ -f json -o bandit-report.json || true
      
      - name: Run tests
        run: |
          pytest backend/tests/ -v --cov=backend --cov-report=term-missing --cov-fail-under=80
